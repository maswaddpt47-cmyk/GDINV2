<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDIN — Dashboard Activité Conum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0f19;
      --s1:      #111827;
      --s2:      #1a2235;
      --s3:      #253047;
      --border:  #1e2d45;
      --text:    #e5e7eb;
      --muted:   #6b7fa0;
      --blue:    #3b82f6;
      --cyan:    #22d3ee;
      --green:   #10b981;
      --orange:  #f97316;
      --yellow:  #eab308;
      --red:     #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* ── Fond animé ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(59,130,246,.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 75% 65%, rgba(16,185,129,.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Conteneur central ── */
    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      gap: 0;
    }

    /* ── Chip CD47 ── */
    .chip-cd47 {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .chip-cd47::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 6px var(--blue);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* ── Logo GDIN ── */
    .logo {
      font-size: clamp(48px, 10vw, 88px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #e5e7eb 30%, #3b82f6 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      user-select: none;
    }

    .subtitle {
      font-size: clamp(13px, 2.5vw, 17px);
      color: var(--muted);
      letter-spacing: .3px;
      margin-bottom: 36px;
    }

    /* ── Badge BÊTA clignotant ── */
    .badge-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .badge-beta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(239,68,68,.12);
      border: 1.5px solid rgba(239,68,68,.5);
      color: #fca5a5;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      animation: blink-badge 1.4s step-end infinite;
    }

    .badge-beta .dot-blink {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      flex-shrink: 0;
    }

    @keyframes blink-badge {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .badge-wip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(234,179,8,.10);
      border: 1.5px solid rgba(234,179,8,.4);
      color: #fde047;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      animation: blink-badge 1.4s step-end infinite;
      animation-delay: .7s;
    }

    .badge-wip .dot-blink {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 8px var(--yellow);
      flex-shrink: 0;
    }

    /* ── Texte info ── */
    .info-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      text-align: center;
      max-width: 460px;
      margin-bottom: 44px;
    }

    .info-text strong {
      color: var(--text);
      font-weight: 500;
    }

    /* ── Bouton principal ── */
    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--blue);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .3px;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, transform .15s, box-shadow .18s;
      box-shadow: 0 0 0 0 rgba(59,130,246,0);
      position: relative;
      overflow: hidden;
    }

    .btn-enter::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.10) 0%, transparent 60%);
    }

    .btn-enter:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(59,130,246,.35);
    }

    .btn-enter:active {
      transform: translateY(0);
    }

    .btn-arrow {
      font-size: 18px;
      transition: transform .2s;
    }
    .btn-enter:hover .btn-arrow { transform: translateX(4px); }

    /* ── Footer ── */
    .footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .5px;
      opacity: .5;
      white-space: nowrap;
    }

    /* ── Séparateur déco ── */
    .divider {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 0 auto 32px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .badge-wrap { flex-direction: column; gap: 8px; }
      .btn-enter { font-size: 14px; padding: 12px 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="wrap">
    <div class="chip-cd47">Conseil Départemental 47</div>

    <div class="logo">GDIN</div>
    <div class="subtitle">Dashboard Activité Conum</div>

    <div class="divider"></div>

    <div class="badge-wrap">
      <div class="badge-beta">
        <span class="dot-blink"></span>
        Version Bêta
      </div>
      <div class="badge-wip">
        <span class="dot-blink"></span>
        Work in Progress
      </div>
    </div>

    <p class="info-text">
      Cette application est en cours de développement.<br>
      Des <strong>modifications, corrections et nouvelles fonctionnalités</strong><br>
      sont régulièrement déployées.
    </p>

    <a href="index.html" class="btn-enter">
      Accéder au tableau de bord
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <div class="footer">GDIN · CD47 · Dashboard Activité Conum</div>
</body>
</html>
