<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GDIN — Tests unitaires</title>
<style>
body{font-family:monospace;background:#0b0f19;color:#dde6f5;padding:24px;font-size:13px}
h1{color:#3b82f6;margin-bottom:4px}
.subtitle{color:#6b7fa0;margin-bottom:24px}
.suite{margin-bottom:20px}
.suite-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#6b7fa0;margin-bottom:8px}
.test{padding:4px 10px;margin:2px 0;border-radius:4px;display:flex;gap:12px;align-items:baseline}
.test.pass{background:rgba(16,185,129,.1);border-left:3px solid #10b981}
.test.fail{background:rgba(239,68,68,.1);border-left:3px solid #ef4444}
.test .status{font-weight:700;width:32px;flex-shrink:0}
.test.pass .status{color:#10b981}
.test.fail .status{color:#ef4444}
.test .name{color:#dde6f5}
.test .detail{color:#6b7fa0;font-size:11px;margin-left:auto}
.test.fail .detail{color:#ef4444}
.summary{margin-top:24px;padding:14px 20px;border-radius:8px;font-size:14px}
.summary.all-pass{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981}
.summary.has-fail{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#ef4444}
</style>
</head>
<body>
<h1>GDIN Tests</h1>
<div class="subtitle">Tests unitaires des fonctions pures — gdin-pure.js</div>
<div id="output"></div>
<script src="gdin-pure.js"></script>
<script>
const results = [];
function eq(got, expected) { return JSON.stringify(got) === JSON.stringify(expected); }
function test(suite, name, fn) {
  let passed = false, detail = '';
  try {
    const r = fn();
    passed = r.ok;
    detail = r.detail || '';
  } catch(e) { detail = 'Exception: ' + e.message; }
  results.push({ suite, name, passed, detail });
}
function expect(got, expected) {
  const ok = eq(got, expected);
  return { ok, detail: ok ? '' : `got ${JSON.stringify(got)}, expected ${JSON.stringify(expected)}` };
}
function expectTrue(v) { return { ok: !!v, detail: v ? '' : 'expected truthy' }; }
function expectThrows(fn) {
  try { fn(); return { ok: false, detail: 'expected throw, got no error' }; }
  catch(e) { return { ok: true }; }
}

// ─── pct ──────────────────────────────────────────────────────────────────
test('pct', '25% de 4', ()=>expect(pct(1,4), 25));
test('pct', '100% de 5', ()=>expect(pct(5,5), 100));
test('pct', '0% de 0 (division par zéro → 0)', ()=>expect(pct(0,0), 0));
test('pct', '0% de n>0', ()=>expect(pct(0,10), 0));
test('pct', 'arrondi 33%', ()=>expect(pct(1,3), 33));

// ─── esc ──────────────────────────────────────────────────────────────────
test('esc', 'balises HTML', ()=>expect(esc('<b>test</b>'), '&lt;b&gt;test&lt;/b&gt;'));
test('esc', 'guillemets', ()=>expect(esc('"hello"'), '&quot;hello&quot;'));
test('esc', 'esperluette', ()=>expect(esc('a&b'), 'a&amp;b'));
test('esc', 'chaîne normale inchangée', ()=>expect(esc('bonjour'), 'bonjour'));

// ─── excelDate ────────────────────────────────────────────────────────────
test('excelDate', 'format DD/MM/YYYY', ()=>expect(excelDate('01/01/2025'), '2025-01-01'));
test('excelDate', 'format DD/MM/YYYY jour2chiffres', ()=>expect(excelDate('15/03/2025'), '2025-03-15'));
test('excelDate', 'format YYYY-MM-DD passthrough', ()=>expect(excelDate('2025-06-30'), '2025-06-30'));
test('excelDate', 'serial Excel 45658 → 2025-01-01', ()=>expect(excelDate(45658), '2025-01-01'));
test('excelDate', 'null → null', ()=>expect(excelDate(null), null));
test('excelDate', 'vide → null', ()=>expect(excelDate(''), null));
test('excelDate', 'zéro → null', ()=>expect(excelDate(0), null));

// ─── parseDt ──────────────────────────────────────────────────────────────
test('parseDt', 'DD/MM/YYYY', ()=>expectTrue(parseDt('15/03/2025') instanceof Date && parseDt('15/03/2025').getMonth()===2));
test('parseDt', 'YYYY-MM-DD', ()=>expectTrue(parseDt('2025-03-15') instanceof Date && parseDt('2025-03-15').getDate()===15));
test('parseDt', 'null → null', ()=>expect(parseDt(null), null));
test('parseDt', 'vide → null', ()=>expect(parseDt(''), null));
test('parseDt', 'objet Date retourné tel quel', ()=>{
  const d = new Date(2025,0,1);
  const r = parseDt(d);
  return { ok: r instanceof Date && r.getFullYear()===2025, detail: '' };
});

// ─── dayDiff ──────────────────────────────────────────────────────────────
test('dayDiff', '4 jours', ()=>expect(dayDiff(new Date(2025,0,6), new Date(2025,0,10)), 4));
test('dayDiff', '0 jours (même date)', ()=>expect(dayDiff(new Date(2025,3,1), new Date(2025,3,1)), 0));
test('dayDiff', 'd2 < d1 → null', ()=>expect(dayDiff(new Date(2025,0,10), new Date(2025,0,6)), null));
test('dayDiff', 'null d1 → null', ()=>expect(dayDiff(null, new Date()), null));

// ─── bizDays ──────────────────────────────────────────────────────────────
// Lundi→Vendredi = 4 jours ouvrés (Lun, Mar, Mer, Jeu)
test('bizDays', 'Lun→Ven = 4 jours ouvrés', ()=>expect(bizDays(new Date(2025,0,6), new Date(2025,0,10)), 4));
// Vendredi→Lundi = 2 jours ouvrés (Sam, Dim exclus, compte Ven→Lun = Ven, Lun)
test('bizDays', 'Ven→Lun = 1 jour ouvré', ()=>expect(bizDays(new Date(2025,0,10), new Date(2025,0,13)), 1));
test('bizDays', 'même date = 0', ()=>expect(bizDays(new Date(2025,0,6), new Date(2025,0,6)), 0));
test('bizDays', 'd2 < d1 → null', ()=>expect(bizDays(new Date(2025,0,10), new Date(2025,0,6)), null));

// ─── monthLabel ───────────────────────────────────────────────────────────
test('monthLabel', '2025-03 → Mar 25', ()=>expect(monthLabel('2025-03'), 'Mar 25'));
test('monthLabel', '2024-01 → Jan 24', ()=>expect(monthLabel('2024-01'), 'Jan 24'));
test('monthLabel', '2025-12 → Déc 25', ()=>expect(monthLabel('2025-12'), 'Déc 25'));

// ─── count ────────────────────────────────────────────────────────────────
test('count', 'compte par clé', ()=>{
  const r = count([{conum:'A'},{conum:'B'},{conum:'A'}], 'conum');
  return expect(r, {A:2,B:1});
});
test('count', 'clé manquante → ?', ()=>{
  const r = count([{conum:'A'},{conum:undefined}], 'conum');
  return expect(r, {A:1,'?':1});
});

// ─── countThemas ──────────────────────────────────────────────────────────
test('countThemas', 'compte thématiques', ()=>{
  const arr = [{themas:['Web','Emploi']},{themas:['Web']},{themas:[]}];
  const r = countThemas(arr);
  return expect(r, {Web:2,Emploi:1});
});
test('countThemas', 'aucune thématique → vide', ()=>expect(countThemas([{themas:[]}]), {}));

// ─── countTypes ───────────────────────────────────────────────────────────
test('countTypes', 'compte types (hors Reservation)', ()=>{
  const arr = [
    {type_action:['Accompagnement','Reservation']},
    {type_action:['Accompagnement']},
    {type_action:['Prise de contact']},
  ];
  const r = countTypes(arr);
  return expect(r, {Accompagnement:2,'Prise de contact':1});
});

// ─── normKey ──────────────────────────────────────────────────────────────
test('normKey', 'supprime accents + lowercase', ()=>expect(normKey('Médiathèque'), 'mediatheque'));
test('normKey', 'normalise espaces', ()=>expect(normKey('  CMS  Agen  '), 'cms agen'));
test('normKey', 'chaîne vide', ()=>expect(normKey(''), ''));

// ─── normCms ──────────────────────────────────────────────────────────────
test('normCms', 'CMS Tonneins → CMS Tonneins', ()=>expect(normCms('CMS Tonneins'), 'CMS Tonneins'));
test('normCms', 'CMS MONTANOU → CMS Agen Montanou', ()=>expect(normCms('CMS MONTANOU'), 'CMS Agen Montanou'));
test('normCms', 'variante accent → canonique', ()=>expect(normCms('Centre Médico-Social de Nérac'), 'CMS Nérac'));
test('normCms', 'inconnu → null', ()=>expect(normCms('Lieu inexistant'), null));
test('normCms', 'vide → null', ()=>expect(normCms(''), null));
test('normCms', 'null → null', ()=>expect(normCms(null), null));

// ─── extractDominantCms ───────────────────────────────────────────────────
test('extractDominantCms', 'CMS seul', ()=>expect(extractDominantCms('CMS Tonneins'), 'CMS Tonneins'));
test('extractDominantCms', 'CMS + DSIAN → CMS (DSIAN exclu)', ()=>expect(extractDominantCms('CMS Tonneins;DSIAN'), 'CMS Tonneins'));
test('extractDominantCms', 'vide → ""', ()=>expect(extractDominantCms(''), ''));
test('extractDominantCms', 'inconnu → Autre structure', ()=>expect(extractDominantCms('Lieu sans mapping'), 'Autre structure'));
test('extractDominantCms', 'variante longue canonisée', ()=>expect(extractDominantCms('Centre Médico-Social Agen Montanou'), 'CMS Agen Montanou'));

// ─── parseXlsText ─────────────────────────────────────────────────────────
test('parseXlsText', 'parse une ligne valide', ()=>{
  const tsv = [
    'date demande\tdate action\ttype action\tlieu / cms\tcommune\tconseiller num\tthematique\torienteur',
    '01/01/2025\t05/01/2025\tAccompagnement\tCMS Tonneins\tTonneins\tTUAL Corentin\tInternet\t',
  ].join('\n');
  const {records} = parseXlsText(tsv);
  const ok = records.length===1
    && records[0].date_demande==='2025-01-01'
    && records[0].cms==='CMS Tonneins'
    && records[0].type_action[0]==='Accompagnement';
  return { ok, detail: ok ? '' : JSON.stringify(records[0]) };
});
test('parseXlsText', 'Reservation exclu des types', ()=>{
  const tsv = [
    'date demande\ttype action\tlieu / cms\tcommune\tconseiller num',
    '2025-01-01\tReservation\tCMS Fumel\tFumel\tTUAL Corentin',
  ].join('\n');
  const {records} = parseXlsText(tsv);
  return expect(records[0].type_action, []);
});
test('parseXlsText', 'lève erreur si Date demande absente', ()=>expectThrows(()=>{
  parseXlsText('col1\tcol2\tcol3\tcol4\tcol5\n1\t2\t3\t4\t5');
}));
test('parseXlsText', 'lève erreur si fichier vide', ()=>expectThrows(()=>{
  parseXlsText('');
}));

// ─── Rendu ────────────────────────────────────────────────────────────────
const suites = {};
results.forEach(({suite, name, passed, detail}) => {
  if (!suites[suite]) suites[suite] = [];
  suites[suite].push({name, passed, detail});
});

const out = document.getElementById('output');
let totalPass = 0, totalFail = 0;
for (const [suite, tests] of Object.entries(suites)) {
  const div = document.createElement('div');
  div.className = 'suite';
  div.innerHTML = `<div class="suite-title">${suite}</div>` +
    tests.map(t => {
      if (t.passed) totalPass++; else totalFail++;
      return `<div class="test ${t.passed?'pass':'fail'}">
        <span class="status">${t.passed?'✓':'✗'}</span>
        <span class="name">${t.name}</span>
        ${t.detail ? `<span class="detail">${t.detail}</span>` : ''}
      </div>`;
    }).join('');
  out.appendChild(div);
}

const sum = document.createElement('div');
const allPass = totalFail === 0;
sum.className = 'summary ' + (allPass ? 'all-pass' : 'has-fail');
sum.textContent = allPass
  ? `✓ Tous les tests passent (${totalPass}/${totalPass})`
  : `✗ ${totalFail} test(s) échoué(s) — ${totalPass}/${totalPass+totalFail} réussis`;
out.appendChild(sum);
</script>
</body>
</html>
